<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 316" role="img" aria-labelledby="title">
  <title id="title">BTS Express delivery truck light</title>
  <defs>
    <filter id="truckShadow" x="-8%" y="-14%" width="116%" height="130%">
      <feDropShadow dx="0" dy="15" stdDeviation="10" flood-color="#3a2317" flood-opacity=".2"/>
    </filter>
    <filter id="logoShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.2" flood-color="#422719" flood-opacity=".22"/>
    </filter>
  </defs>
  <g filter="url(#truckShadow)">
    <image href="bts-truck-real-light-base.png" x="0" y="0" width="820" height="316" preserveAspectRatio="xMidYMid meet" transform="translate(820 0) scale(-1 1)"/>
  </g>
  <g filter="url(#logoShadow)" transform="translate(214 121)">
    <text x="0" y="0" fill="#fff8ec" font-family="Arial Black, Arial, sans-serif" font-size="47" font-weight="900" letter-spacing="-2">BTS</text>
    <text x="9" y="24" fill="#fff8ec" font-family="Arial, sans-serif" font-size="14" font-weight="900" letter-spacing="1.6">EXPRESS</text>
    <path fill="none" stroke="#fff8ec" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" d="m128 -39 42 -12 15 49 -42 12Z"/>
    <path fill="none" stroke="#fff8ec" stroke-width="4.2" stroke-linecap="round" d="m133 -27 44 -13M140 -10l43 -13"/>
  </g>
</svg>
